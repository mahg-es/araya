version: 0.3.0
description: ARAYA — AI-Native SDLC Orchestration Framework with Enterprise Governance
delivery_modes:
  full:
    description: All gates — new features, architecture changes, data model changes,
      security-sensitive, large refactors
    phases:
    - sdd
    - bdd
    - tdd
    - implementation
    - review
    - security
    - validation
    - documentation
    requires_approval: true
  standard:
    description: Normal feature work
    phases:
    - plan
    - tests
    - implementation
    - review
    - validation
    requires_approval: false
  quick:
    description: Documentation, naming fixes, UI text, minor config
    phases:
    - review
    requires_approval: false
  review:
    description: Code review, PR review, architecture review
    phases:
    - review
    - security
    requires_approval: false
  repair:
    description: Fixing failed tests, broken builds, lint issues, regressions
    phases:
    - tests
    - validation
    requires_approval: false
workflow_policies:
  auto:
    description: Sonia decides dynamically based on task analysis
    default_gates: all
    override: false
  conservative:
    description: Prefers more gates and reviews
    default_gates: all
    require_security_review: true
    require_architect_review: true
  balanced:
    description: Standard enterprise workflow
    default_gates:
    - plan
    - tests
    - implementation
    - review
    - validation
    require_security_review: false
    require_architect_review: false
  aggressive:
    description: Optimized for speed, reduced approvals
    default_gates:
    - implementation
    - review
    require_security_review: false
    require_architect_review: false
model_tiers:
  fast:
    purpose: Documentation, formatting, simple edits, grep/find, simple QA
    primary_provider: deepseek
    primary_capability: non_thinking_fast
    allowed_fallback_providers:
    - openai
    - google
    reasoning_effort: low
  balanced:
    purpose: Standard development, code review, test generation, BDD features
    primary_provider: deepseek
    primary_capability: non_thinking_balanced
    allowed_fallback_providers:
    - openai
    - google
    reasoning_effort: medium
  reasoning:
    purpose: Architecture, security analysis, complex debugging, SDD, planning, risk
      analysis
    primary_provider: deepseek
    primary_capability: thinking_reasoning
    allowed_fallback_providers:
    - openai
    - google
    reasoning_effort: high
execution_budget:
  max_cost_usd: 2.0
  max_runtime_minutes: 20
  max_parallel_agents: 4
  max_reasoning_tokens: 50000
  max_turns_per_agent: 30
circuit_breakers:
  max_failures_per_phase: 3
  max_retries: 2
  stop_on_security_failure: true
  stop_on_schema_risk: true
  stop_on_cost_threshold_exceeded: true
execution_modes:
  deterministic:
    description: Lower temperature, stable prompts, reproducible outputs
  adaptive:
    description: More creativity, exploration, broader solution search
safe_mode:
  description: Dry-run — no writes to disk, no shell execution, no git operations
  restrictions:
  - no_write_to_disk
  - no_shell_execution
  - no_git_operations
branch_strategy:
  main:
    type: protected
    description: No direct writes
  dev:
    type: integration
    description: PR required from feature/*
  feature:
    type: execution
    description: Worktree isolation, auto-commit
    pattern: feature/*
  hotfix:
    type: repair
    description: Expedited but gated
    pattern: hotfix/*
  review:
    type: governance
    description: Read-only validation
    pattern: review/*
human_approval_required_for:
- destructive_operations
- schema_changes
- infrastructure_changes
- dependency_upgrades
- security_sensitive
artifact_storage:
  runs: .araya/runs/
  reports: .araya/reports/
  evidence: .araya/evidence/
  telemetry: .araya/telemetry/
  approvals: .araya/approvals/
  memory: .araya/memory/
