# capability-catalog-system — Catálogo Canónico (REQ-001 AC-1)
entity_id: "capability-catalog-system"
entity_type: "Capability"
name: "Sistema de Catálogo Canónico"
source_artifact: "spec"
source_path: ".araya/plan/spec/req-001-catalog-schema.md"
description: >
  Catálogo canónico de comandos, funciones, skills y agentes ARAYA.
  Auto-generado desde fuentes reales del repositorio (araya.yaml, skills/,
  prompts/agents/, extensions/). Provee los datos que alimentan /araya:man,
  la búsqueda y la validación de capacidades del broker de delegación.
  Diseñado por Aisha (Backend Architect) en WS-04, implementado por Valentina
  en WS-07.

requirements:
  - "AC-1: Catálogo canónico existe"
  - "AC-3: /araya:man <función> detalle"
  - "AC-4: /araya:man <agente> detalle"
  - "AC-6: Ayuda validada contra fuentes reales"
  - "AC-8: Búsqueda por keyword/dominio/agente/skill"
  - "AC-21: Respeta frontera público/privado"
  - "AC-23: Daneel verifica catálogo = repository truth"

schema_entities:
  - "Command"
  - "Function"
  - "Skill"
  - "Agent"
  - "Capability"

schema_attributes:
  - "purpose"
  - "syntax"
  - "parameters"
  - "examples"
  - "constraints"
  - "responsible_specialist"
  - "preconditions"
  - "permissions"
  - "risks"
  - "side_effects"
  - "related_capabilities"
  - "alternative_capabilities"
  - "status (available, disabled, deprecated, not_installed)"

source_artifacts:
  - "araya.yaml → Agent entities, Skill assignments"
  - "skills/*/SKILL.md → Skill entities"
  - "prompts/agents/*.md → Agent prompts and self-declared skills"
  - "extensions/araya/index.ts → Command registrations"
  - "src/ → Runtime functions"

components:
  - "registry: Estructura de datos del catálogo"
  - "populator: Extraer comandos/funciones/skills/agentes desde fuentes reales"
  - "validator: Verificar que el catálogo coincide con repository truth; detectar drift"

related_agents:
  architect: "aisha"
  implementer: "valentina"
  verifier: "daneel"

parent_project: "project-req-001"
status: "designed"
created_at: "2026-07-22"
updated_at: "2026-07-22"
